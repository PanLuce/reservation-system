name: Production Login Smoke Test

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: smoke-login
  cancel-in-progress: false

jobs:
  smoke:
    name: Login smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --include=dev
      - run: npx playwright install --with-deps chromium
      - name: Random jitter (0–120s)
        run: sleep $((RANDOM % 121))
      - name: Run smoke test
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: npx playwright test --config=playwright.smoke.config.ts
      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-trace
          path: test-results/
          retention-days: 7
