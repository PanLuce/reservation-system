services:
  - type: web
    name: reservation-system
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: false
    nodeVersion: "20"
    buildCommand: npm ci --include=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Set the following secrets manually in the Render dashboard:
      # TURSO_DATABASE_URL    - Turso database URL (libsql://...)
      # TURSO_AUTH_TOKEN      - Turso auth token
      # SESSION_SECRET        - strong random string (required in production)
      # ALLOWED_ORIGINS       - comma-separated, e.g. https://centrumrubacek.cz
      # ADMIN_EMAIL_SEED      - admin account email for seed
      # ADMIN_PASSWORD_SEED   - admin account password for seed
      # PARTICIPANT_EMAIL_SEED
      # PARTICIPANT_PASSWORD_SEED
      # SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
      # ADMIN_EMAIL, FROM_EMAIL
      # LOG_LEVEL             - optional, defaults to "info" in production
      # ENABLE_QUICK_LOGIN    - optional, set to "true" only for dev/staging
